<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amanita Cap Search - Amanita Key Project</title>
    <link rel="stylesheet" href="./css/search.css" />
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <section class="card">
            <div class="section-title">
                <div>
                    <h2>Morphological Search</h2>
                    <p class="page-intro">
                        Search Amanita records by visible cap traits. Start with the obvious features,
                        then open “More cap traits” if you want to narrow the search.
                    </p>
                </div>
            </div>

            <form id="search-form">
                <h3>Cap</h3>
                <div id="major-fields"></div>

                <details class="more-traits" id="more-cap-traits">
                    <summary>More cap traits</summary>
                    <div id="more-fields"></div>
                </details>

                <div class="button-row">
                    <button type="submit">Search</button>
                    <button class="secondary" type="reset">Clear</button>
                </div>
            </form>

            <div id="results"></div>
        </section>
    </main>

    <footer>
        Built with GitHub Pages •
        <a href="https://github.com/">View Source</a>
    </footer>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
