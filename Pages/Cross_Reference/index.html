<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amanita Cross Reference - Amanita Key Project</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Basic CSS embedded; you can move this to style.css later -->
    <style>
        :root {
            --bg: #fafafa;
            --fg: #222;
            --accent: #5a6f4e; /* muted green */
            --accent-light: #cdd6c3;
            --max-width: 900px;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
        }

        header {
            background: var(--accent);
            color: white;
            padding: 1.2rem;
        }

        header h1 {
            margin-bottom: 0.4rem;
        }

        nav {
            margin-top: 0.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 1.2rem;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .species-section {
            margin-bottom: 3rem;
            border: 1px solid var(--accent-light);
            border-radius: var(--radius);
            padding: 1rem;
        }

        .species-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .map-container {
            height: 400px;
            margin-bottom: 1rem;
            border-radius: var(--radius);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: var(--radius);
        }

        .description {
            margin-top: 1rem;
        }

        .filters {
            margin-bottom: 1rem;
        }

        .filters label {
            margin-right: 1rem;
        }

        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .gallery img {
                height: 120px;
            }

            main {
                padding: 1rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <h1>Amanita Cross Reference</h1>
        <p>Compare iNaturalist data for multiple Amanita species.</p>

        <div id="map-container" class="map-container"></div>

        <div class="filters" id="filters"></div>

        <div id="content">
            <div class="loading">Loading species data...</div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Our script -->
    <script src="crossReference.js?v=2"></script>

    <script>
        // Load header
        fetch('../../Components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });

        // Get species from URL
        const urlParams = new URLSearchParams(window.location.search);
        const speciesParam = urlParams.get('species');
        if (speciesParam) {
            const speciesNames = speciesParam.split(',').map(s => s.trim());
            fetchSpeciesData(speciesNames);
        } else {
            document.getElementById('content').innerHTML = '<p>No species specified. Use ?species=Name1,Name2 in the URL.</p>';
        }
    </script>
</body>
</html>
